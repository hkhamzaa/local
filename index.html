<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button data-action="clear" class="btn btn-clear">C</button>
            <button data-action="back" class="btn btn-back">⌫</button>
            <button data-action="percent" class="btn btn-op">%</button>
            <button data-value="/" class="btn btn-op">÷</button>

            <button data-value="7" class="btn">7</button>
            <button data-value="8" class="btn">8</button>
            <button data-value="9" class="btn">9</button>
            <button data-value="*" class="btn btn-op">×</button>

            <button data-value="4" class="btn">4</button>
            <button data-value="5" class="btn">5</button>
            <button data-value="6" class="btn">6</button>
            <button data-value="-" class="btn btn-op">−</button>

            <button data-value="1" class="btn">1</button>
            <button data-value="2" class="btn">2</button>
            <button data-value="3" class="btn">3</button>
            <button data-value="+" class="btn btn-op">+</button>

            <button data-value="0" class="btn btn-zero">0</button>
            <button data-value="." class="btn">.</button>
            <button data-action="equals" class="btn btn-equal">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
